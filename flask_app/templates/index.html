<!DOCTYPE html>

<html>
    <head>
        <title>ISL Bridge</title>
        <script src = "/static/script.js" defer></script>
        <link rel = "stylesheet" href="/static/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    </head>

    <body>

        <!hidden canvas for capturing frames>
            <canvas id = "canvas" style = "display : none"></canvas>
        
        <div id = header>
            <h1>ISL Bridge</h1>
            <h2>Real-time Indian Sign Language Fingerspelling Recognition System</h2>
        </div>

        <div id = "setup-screen">
            <div class = "setup-card">
                <div class = "source-options">
                    <label><input type = "radio" name = "source" value = "camera" id = "camera-button">Camera</label>
                    <label><input type = "radio" name = "source" value = "video" id = "video-button">Video</label>
                </div>

                <div id = "file-input" style = "display : none">
                    <input type = "file" accept = "video/*" id = "video-file">
                </div>

                <!start button>
                <button id ="start" style = "display : none">Start</button>

                <p id = "prompt" style = "display: none"></p>
            </div>
        </div>

        <div id = "main-screen" style = "display : none">
            
            <div class = "button-row">
                <!speak button>
                <button id = "speak">Speak</button>

                <!stop button>
                <button id = "end">End</button>

                <!reset button>
                <button id = "reset">Reset</button>

                <!pause/resume button>
                <button id = "pause" style = "display : none">Pause</button>
            </div>

            <div class = "content-row">
                <div class = "video-container">
                    <!video feed of camera or video file>
                    <video id = "video-feed" autoplay></video> 
                </div>

                <div class = "right-panel">
                    <div class = "text-panel">
                        <!text boxes>
                        <p><span class="text-label">Sign:</span> <span class="text-value" id="confirmed-sign"></span></p>
                        <p><span class="text-label">Word:</span> <span class="text-value" id="word-formed-so-far"></span></p>
                        <p><span class="text-label">Sentence:</span> <span class="text-value" id="sentence"></span></p>
                    </div>

                    <div class = "language-row">
                        <!language dropdown>
                        <label>Language:</label>
                        <select id = "language">
                            <option value = "en">english</option>
                        </select>
                    </div>

                    <p id = "prompt2" style = "display : none"></p>
                </div>
            </div>
        </div>

        <div id = "goodbye-screen" style = "display : none">
            <p>Session Ended</p>
        </div>

    </body>

</html>
